<!DOCTYPE html>
<html>
<head>
<script>
function validate() {
    let n = document.f.name.value;
    let e = document.f.email.value;

    if (n == "" || e == "") {
        alert("Fill all fields");
        return false;
    }

    if (!e.includes("@")) {
        alert("Invalid Email");
        return false;
    }
}
</script>
</head>
<body>

<form name="f" onsubmit="return validate()">
    Name: <input type="text" name="name"><br><br>
    Email: <input type="text" name="email"><br><br>
    <input type="submit">
</form>

</body>
</html>
