<!DOCTYPE html>
<html>
<head>
    <title>CSS Example Web Page</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: blue;
            text-align: center;
        }

        table {
            width: 40%;
            border-collapse: collapse;
            margin: auto;
        }

        th, td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: rgb(190, 75, 75);
        }
    </style>

    <!-- External CSS Link -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center;">Student Information</h1>

    <h2>Using Internal CSS</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>Sunny</td>
            <td>Engineering</td>
            <td>85</td>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>BCA</td>
            <td>90</td>
        </tr>
    </table>

</body>
</html>
