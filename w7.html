<!DOCTYPE html>
<html>
<head>
    <title>Dynamic DOM Example</title>
    <script>
        function showMessage() {
            document.getElementById("demo").innerHTML = "Hello! Welcome to JavaScript DOM.";
        }
    </script>
</head>
<body>

    <h2>Dynamic Content Display</h2>

    <button onclick="showMessage()">Click Me</button>

    <p id="demo"></p>

</body>
</html>
