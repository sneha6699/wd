<!DOCTYPE html>
<html>
<head>
    <title>Image, Hyperlink, and Nested Table</title>
</head>
<body>

    <h1>My Web Page</h1>

    
    <h2>Sample Image</h2>
    <img src="https://via.placeholder.com/200" alt="Sample Image" width="200" height="200">


    <h2>Visit Website</h2>
    <a href="https://www.google.com" >Click Here to Visit Google</a>

    
    <h2>Nested Table Example</h2>
    <table border="2" cellpadding="10">
        <tr>
            <th>Main Table Column 1</th>
            <th>Main Table Column 2</th>
        </tr>
        <tr>
            <td>Outer Table Data</td>
            <td>
                <table border="1" cellpadding="5">
                    <tr>
                        <th> table 1</th>
                        <th>table 2</th>
                    </tr>
                    <tr>
                        <td>Inner Data 1</td>
                        <td>Inner Data 2</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

</body>
</html>
